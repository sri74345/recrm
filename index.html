        body

// ── DEAL HEALTH SCORE ────────────────────────────────────────
function calcDealHealth(customer, followups) {
  var fus = followups.filter(function(f){ return f.customerId === customer.id; });
  var score = 0;
  var signals = [];
  var risks = [];

  // Base: enquiry type
  if (customer.enquiryType === "Hot")  { score += 25; signals.push("🔥 Hot lead"); }
  if (customer.enquiryType === "Warm") { score += 12; }
  if (customer.enquiryType === "Cold") { score += 5; }

  // Follow-up history
  var doneFUs   = fus.filter(function(f){ return f.status === "Done"; });
  var siteVisit = fus.find(function(f){ return f.followupType === "Site Visit" && f.status === "Done"; });
  var booking   = fus.find(function(f){ return f.followupType === "Booking"; });
  var nego      = fus.find(function(f){ return f.followupType === "Negotiation"; });

  if (doneFUs.length >= 1)  { score += 10; }
  if (doneFUs.length >= 3)  { score += 10; signals.push("✅ Multiple follow-ups done"); }
  if (siteVisit)            { score += 20; signals.push("🏗️ Site visit completed"); }
  if (nego)                 { score += 10; signals.push("🤝 In negotiation"); }
  if (booking)              { score += 15; signals.push("📋 Booking initiated"); }

  // Profile completeness
  if (customer.budget)       { score += 5; signals.push("💰 Budget known"); }
  if (customer.propertyType) { score += 3; }
  if (customer.location)     { score += 2; }

  // Pipeline stage bonus
  var stageBonus = {"new":0,"contacted":5,"sitevisit":15,"negotiation":20,"booked":30,"registered":35};
  score += stageBonus[customer.pipelineStage || "new"] || 0;

  // Recency penalty
  var lastFU = fus.sort(function(a,b){ return b.createdAt>a.createdAt?1:-1; })[0];
  var lastContact = lastFU ? parseDate(lastFU.createdAt) : parseDate(customer.createdAt);
  var daysSince = lastContact ? Math.floor((new Date() - lastContact) / 86400000) : 0;

  if (daysSince > 14) { score -= 20; risks.push("⚠️ " + daysSince + " days no contact"); }
  else if (daysSince > 7) { score -= 10; risks.push("⏰ " + daysSince + " days no contact"); }
  else if (daysSince <= 2) { signals.push("✅ Recently contacted"); }

  // Overdue follow-ups
  var today = new Date().toISOString().split("T")[0];
  var overdue = fus.filter(function(f){ return f.status !== "Done" && toDateStr(f.scheduledDate) < today; });
  if (overdue.length > 0) { score -= 10 * overdue.length; risks.push("❌ " + overdue.length + " overdue follow-up" + (overdue.length>1?"s":"")); }

  score = Math.max(0, Math.min(100, score));

  // Closing signal
  var signal = score >= 70 ? "green" : score >= 40 ? "yellow" : score >= 20 ? "orange" : "red";
  var signalLabel = score >= 70 ? "🟢 Ready to Close" : score >= 40 ? "🟡 Warming Up" : score >= 20 ? "🟠 Needs Attention" : "🔴 Going Cold";
  var signalColor = score >= 70 ? "#68D391" : score >= 40 ? "#F6AD55" : score >= 20 ? "#FC814A" : "#FC4A4A";

  return { score, signal, signalLabel, signalColor, signals, risks, daysSince };
}

  db.customers.forEach(function(c){

  });

  var contacted   = db.customers.filter(function(c){ var s=c.pipelineStage||"new"; return ["contacted","sitevisit","negotiation","booked","registered"].includes(s); }).length;
  var siteVisited = db.customers.filter(function(c){ var s=c.pipelineStage||"new"; return ["sitevisit","negotiation","booked","registered"].includes(s); }).length;
  var negotiating = db.customers.filter(function(c){ var s=c.pipelineStage||"new"; return ["negotiation","booked","registered"].includes(s); }).length;
  var booked      = db.customers.filter(function(c){ var s=c.pipelineStage||"new"; return ["booked","registered"].includes(s); }).length;
  var registered  = stageCounts["registered"] || 0;

  var pct = function(n){ return total > 0 ? Math.round(n/total*100) : 0; };

  // Find biggest drop-off
  var drops = [
    { stage:"New→Contacted",    loss: total - contacted,   pct: pct(total-contacted) },
    { stage:"Contacted→Site",   loss: contacted - siteVisited, pct: pct(contacted-siteVisited) },
    { stage:"Site→Negotiation", loss: siteVisited - negotiating, pct: pct(siteVisited-negotiating) },
    { stage:"Nego→Booking",     loss: negotiating - booked, pct: pct(negotiating-booked) },
  ];
  var biggestDrop = drops.sort(function(a,b){ return b.loss-a.loss; })[0];

  // Source analysis
  var sources = {};
  db.customers.forEach(function(c){
    var src = c.source || "Unknown";
    if (!sources[src]) sources[src] = { total:0, booked:0 };
    sources[src].total++;
    if (["booked","registered"].includes(c.pipelineStage||"new")) sources[src].booked++;
  });
  var bestSource = Object.entries(sources).sort(function(a,b){ return (b[1].booked/Math.max(b[1].total,1)) - (a[1].booked/Math.max(a[1].total,1)); })[0];

  return {
    total, contacted, siteVisited, negotiating, booked, registered,
    stageCounts, biggestDrop, bestSource,

  };
}

// PSR CRM — CENTRAL MIDDLEWARE SCRIPT
// Deploy this ONCE on YOUR Google Sheet (not the agent's).

function doGet(e) {
  const p = e.parameter;
  if (p.action === "verifyPin")   return verifyPin(p.sheetId, p.pin);
  if (p.action === "getAll")      return getAll(p.sheetId);
  if (p.action === "ping")        return json({ ok: true, app: "PSR_CRM_CENTRAL" });
  if (p.action === "checkAgent")  return checkAgent(p.sheetId);
  return json({ error: "Unknown action" });
}

function doPost(e) {
  try {
    const d = JSON.parse(e.postData.contents);
    if (d.action === "syncAll")    { syncAll(d.sheetId, d);    return json({ success: true }); }
    if (d.action === "setupAgent") return setupAgent(d.sheetId, d);
    if (d.action === "changePin")  return changePin(d.sheetId, d);
    return json({ success: true });
  } catch(err) { return json({ error: err.message }); }
}

function json(obj) {
  return ContentService.createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);
}

function getSheet(sheetId, name) {
  const ss = SpreadsheetApp.openById(sheetId);
  return ss.getSheetByName(name) || ss.insertSheet(name);
}

// ── PIN VERIFY ───────────────────────────────────────────
function verifyPin(sheetId, pin) {
  if (!sheetId) return json({ success: false, error: "No sheet ID" });
  const sheet = getSheet(sheetId, "Agents");
  const rows  = sheet.getDataRange().getValues();
  if (rows.length < 2) return json({ success: false, error: "No agents configured" });
  const hdrs = rows[0].map(h => String(h).trim());
  for (let i = 1; i < rows.length; i++) {
    const row = {};
    hdrs.forEach((h, j) => { row[h] = String(rows[i][j] || "").trim(); });
    if (row.pin === String(pin).trim()) {
      return json({ success: true, agent: {
        id: row.id || ("agent_" + i),
        name: row.name || "Agent",
        mobile: row.mobile || "",
        sheetId: sheetId
      }});
    }
  }
  return json({ success: false, error: "Wrong PIN" });
}

// ── CHECK AGENT EXISTS ───────────────────────────────────
function checkAgent(sheetId) {
  if (!sheetId) return json({ hasAgents: false });
  try {
    const sheet = getSheet(sheetId, "Agents");
    const rows  = sheet.getDataRange().getValues();
    return json({ hasAgents: rows.length >= 2 });
  } catch(e) { return json({ hasAgents: false, error: e.message }); }
}

// ── SETUP AGENT ──────────────────────────────────────────
function setupAgent(sheetId, data) {
  const sheet = getSheet(sheetId, "Agents");
  const rows  = sheet.getDataRange().getValues();
  if (rows.length === 0 || rows[0][0] === "") {
    sheet.clearContents();
    sheet.appendRow(["id","name","mobile","pin","sheetId","createdAt"]);
    sheet.getRange(1,1,1,6).setBackground("#1A1040").setFontColor("#fff").setFontWeight("bold");
    sheet.setFrozenRows(1);
  }
  const allRows  = sheet.getDataRange().getValues();
  const hdrs     = allRows[0].map(h => String(h).trim());
  const mobCol   = hdrs.indexOf("mobile");
  const pinCol   = hdrs.indexOf("pin");
  const clean    = String(data.mobile || "").replace(/\D/g,"").slice(-10);
  for (let i = 1; i < allRows.length; i++) {
    if (String(allRows[i][mobCol]||"").replace(/\D/g,"").slice(-10) === clean) {
      sheet.getRange(i+1, pinCol+1).setValue(String(data.pin));
      return json({ success: true, updated: true });
    }
  }
  sheet.appendRow([
    "agent_" + Date.now(), data.name || "Agent",
    data.mobile || "", String(data.pin), sheetId,
    new Date().toLocaleString()
  ]);
  sheet.autoResizeColumns(1,6);
  return json({ success: true });
}

// ── CHANGE PIN ───────────────────────────────────────────
function changePin(sheetId, data) {
  const sheet = getSheet(sheetId, "Agents");
  const rows  = sheet.getDataRange().getValues();
  const hdrs  = rows[0].map(h => String(h).trim());
  const pinCol = hdrs.indexOf("pin");
  for (let i = 1; i < rows.length; i++) {
    if (String(rows[i][pinCol]||"").trim() === String(data.oldPin||"").trim()) {
      sheet.getRange(i+1, pinCol+1).setValue(String(data.newPin));
      return json({ success: true });
    }
  }
  return json({ success: false, error: "Current PIN not matched" });
}

// ── SYNC ALL → AGENT'S SHEET ─────────────────────────────
function syncAll(sheetId, data) {
  writeTable(sheetId, "Customers", data.customers, [
    "id","name","mobile","email","location","propertyType",
    "budget","enquiryType","source","dob","pipelineStage","notes","createdAt"
  ]);
  writeTable(sheetId, "FollowUps", data.followups, [
    "id","customerId","followupType","scheduledDate","scheduledTime",
    "discussion","notes","projectId","status","doneNotes","createdAt"
  ]);
  writeTable(sheetId, "Projects", data.projects, ["id","name","type"]);
  const log = getSheet(sheetId, "SyncLog");
  log.appendRow([new Date().toLocaleString(), "Sync OK",
    (data.customers||[]).length+" customers",
    (data.followups||[]).length+" followups"]);
}

function writeTable(sheetId, name, rows, headers) {
  const sheet = getSheet(sheetId, name);
  sheet.clearContents();
  sheet.appendRow(headers);
  if (rows && rows.length > 0) {
    rows.forEach(row => sheet.appendRow(headers.map(h => row[h] !== undefined ? row[h] : "")));
    sheet.autoResizeColumns(1, headers.length);
  }
}

// ── GET ALL FROM AGENT'S SHEET ───────────────────────────
function getAll(sheetId) {
  const readSheet = (name) => {
    const sheet = getSheet(sheetId, name);
    const rows  = sheet.getDataRange().getValues();
    if (rows.length <= 1) return [];
    const hdrs = rows[0];
    return rows.slice(1).map(row => {
      const obj = {};
      hdrs.forEach((h, i) => { obj[h] = row[i] !== undefined ? String(row[i]) : ""; });
      return obj;
    });
  };
  return json({
    customers: readSheet("Customers"),
    followups: readSheet("FollowUps"),
    projects:  readSheet("Projects")
  });
}`;

// FEATURE 1: TODAY'S HIT LIST — Smart daily priority list
// ============================================================
function buildHitList(db) {
  var todayStr = new Date().toISOString().split("T")[0];
  var now = new Date();
  var items = [];

  db.customers.forEach(function(c) {
    var score = 0;
    var reasons = [];
    var tags = [];

    // Birthday today
    var isBday = c.dob && (function(){
      try {
        var d = new Date(c.dob);
        var today = new Date();
        return d.getMonth() === today.getMonth() && d.getDate() === today.getDate();
      } catch(e){ return false; }
    })();
    if (isBday) { score += 100; reasons.push("🎂 Birthday today — wish them!"); tags.push("birthday"); }

    // Overdue follow-ups
    var overdueFUs = db.followups.filter(function(f){
      return f.customerId === c.id && f.status !== "Done" && toDateStr(f.scheduledDate) < todayStr;
    });
    if (overdueFUs.length > 0) {
      score += 80 + overdueFUs.length * 10;
      reasons.push("⏰ " + overdueFUs.length + " overdue follow-up" + (overdueFUs.length>1?"s":""));
      tags.push("overdue");
    }

    // Scheduled today
    var todayFUs = db.followups.filter(function(f){
      return f.customerId === c.id && (f.scheduledDate === todayStr || isTodayDate(f.scheduledDate)) && f.status !== "Done";
    });
    if (todayFUs.length > 0) {
      score += 70;
      var ft = todayFUs[0];
      reasons.push("📅 " + ft.followupType + (ft.scheduledTime ? " at " + ft.scheduledTime : " today"));
      tags.push("today");
    }

    // Hot lead going cold - no contact in 3+ days
    var allFUs = db.followups.filter(function(f){ return f.customerId === c.id; });
    var lastFU = allFUs.sort(function(a,b){ return b.createdAt > a.createdAt ? 1 : -1; })[0];
    var lastContact = lastFU ? parseDate(lastFU.createdAt) : parseDate(c.createdAt);
    var daysSince = lastContact ? Math.floor((now - lastContact) / 86400000) : 0;

    var addedToday = isTodayDate(c.createdAt);
    if (!addedToday && c.enquiryType === "Hot" && daysSince >= 3 && !overdueFUs.length && !todayFUs.length) {
      score += 60;
      reasons.push("🔥 Hot lead — " + daysSince + " day" + (daysSince===1?"":"s") + " no contact");
      tags.push("hot");
    }

    // Warm lead going cold - no contact in 7+ days
    if (!addedToday && c.enquiryType === "Warm" && daysSince >= 7 && !overdueFUs.length && !todayFUs.length) {
      score += 40;
      reasons.push("☀️ Warm lead — " + daysSince + " days silent");
      tags.push("warm");
    }

    // New lead added today - needs first follow-up
    var fuCount = db.followups.filter(function(f){ return f.customerId === c.id; }).length;
    if (isTodayDate(c.createdAt) && fuCount === 0) {
      score += 50;
      reasons.push("🆕 Added today — no follow-up yet");
      tags.push("new");
    }

    if (score > 0 && reasons.length > 0) {
      items.push({ customer: c, score: score, reason: reasons[0], tags: tags, daysSince: daysSince, overdueFUs: overdueFUs, todayFUs: todayFUs });
    }
  });

  // Sort by score descending, limit to 15
  return items.sort(function(a,b){ return b.score - a.score; }).slice(0, 15);
}

            style:{padding:"14px",borderRadius:12,border:"1px solid var(--card-border)",background:"var(--card-bg)",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"},

  var cold = matches.filter(function(c){return c.enquiryType==="Cold";});

      ce("div",{style:{padding:"14px 18px 12px",borderBottom:"1px solid var(--divider)",flexShrink:0}},
        ce("button",{onClick:function(){setSelProject(null);},style:{background:"none",border:"none",cursor:"pointer",color:"#B794F6",fontSize:12,fontWeight:700,marginBottom:6,padding:0}},"← Back"),

          ce("span",{className:"pill",style:{background:"rgba(246,173,85,0.15)",color:"#F6AD55",border:"1px solid #F6AD55"}},"☀️ "+warm.length+" Warm"),

          : matches.map(function(c,i){
