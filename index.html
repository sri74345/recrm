    return s;
  } catch { return null; }
};

const syncToSheets = async (db, scriptUrl) => {
  if (!scriptUrl) throw new Error("No Script URL configured");
  const payload = {
    action: "syncAll",
    customers: db.customers,
    followups: db.followups,
    projects: db.projects,
  };
  const res = await fetch(scriptUrl, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(payload),
  });
  return true;
};

// Pull latest data from Google Sheets
const pullFromSheets = async (scriptUrl) => {
  if (!scriptUrl) throw new Error("No Script URL configured");
  const url = `${scriptUrl}?action=getAll&t=${Date.now()}`;
  const res = await fetch(url, { mode: "cors" });
  if (!res.ok) throw new Error("Failed to fetch from Sheets");
  const data = await res.json();
  return data;
};

// REAL ESTATE CRM — Google Apps Script Backend

const SHEET_NAME = "RE_CRM";

function doGet(e) {
  const action = e.parameter.action;
  if (action === "getAll") return getAll();
  return ContentService.createTextOutput(JSON.stringify({ error: "Unknown action" }))
    .setMimeType(ContentService.MimeType.JSON);
}

function doPost(e) {
  try {
    const data = JSON.parse(e.postData.contents);
    if (data.action === "syncAll") syncAll(data);
    return ContentService.createTextOutput(JSON.stringify({ success: true }))
      .setMimeType(ContentService.MimeType.JSON);
  } catch(err) {
    return ContentService.createTextOutput(JSON.stringify({ error: err.message }))
      .setMimeType(ContentService.MimeType.JSON);
  }
}

function getOrCreateSheet(name) {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  return ss.getSheetByName(name) || ss.insertSheet(name);
}

function writeTable(sheetName, rows, headers) {
  const sheet = getOrCreateSheet(sheetName);
  sheet.clearContents();
  if (!rows || rows.length === 0) {
    sheet.appendRow(headers);
    return;
  }
  sheet.appendRow(headers);
  rows.forEach(row => sheet.appendRow(headers.map(h => row[h] !== undefined ? row[h] : "")));
  // Auto-resize columns
  sheet.autoResizeColumns(1, headers.length);
}

function syncAll(data) {
  // Customers sheet
  writeTable("Customers", data.customers, [
    "id","name","mobile","email","location","propertyType",
    "budget","enquiryType","source","dob","notes","createdAt"
  ]);
  // FollowUps sheet
  writeTable("FollowUps", data.followups, [
    "id","customerId","followupType","scheduledDate","scheduledTime",
    "discussion","notes","projectId","status","doneNotes","createdAt"
  ]);
  // Projects sheet
  writeTable("Projects", data.projects, ["id","name","type"]);
  // Log sync time
  const logSheet = getOrCreateSheet("SyncLog");
  logSheet.appendRow([new Date().toLocaleString(), "Sync successful",
    (data.customers||[]).length + " customers",
    (data.followups||[]).length + " followups"]);
}

function getAll() {
  const readSheet = (name, headers) => {
    const sheet = getOrCreateSheet(name);
    const rows = sheet.getDataRange().getValues();
    if (rows.length <= 1) return [];
    const hdrs = rows[0];
    return rows.slice(1).map(row => {
      const obj = {};
      hdrs.forEach((h, i) => { obj[h] = row[i] !== undefined ? String(row[i]) : ""; });
      return obj;
    });
  };
  const result = {
    customers: readSheet("Customers"),
    followups: readSheet("FollowUps"),
    projects: readSheet("Projects"),
  };
  return ContentService.createTextOutput(JSON.stringify(result))
    .setMimeType(ContentService.MimeType.JSON);
}`;

  const i2 = React.useRef(); const i3 = React.useRef();
  const refs = [i0, i1, i2, i3];

  const handleDigit = (idx, val) => {
    const d = val.replace(/[^0-9]/g,"").slice(-1);
    const np = [...pin]; np[idx] = d; setPin(np); setErrMsg("");
    if (d && idx < 3) refs[idx+1].current && refs[idx+1].current.focus();
    if (np.every(v=>v) && d) doVerify(np.join(""));
  };

  const handleKey = (idx, e) => {
    if (e.key==="Backspace" && !pin[idx] && idx>0) {
      refs[idx-1].current && refs[idx-1].current.focus();
      const np=[...pin]; np[idx-1]=""; setPin(np);
    }
  };

  const doVerify = async (fullPin) => {
    setStatus("loading"); setErrMsg("");
    try {
      const result = await verifyPin(fullPin);
      if (result.success && result.agent) {
        setStatus("success");
        setTimeout(() => onLogin(result.agent), 500);
      } else {
        setStatus("error");
        setErrMsg("Wrong PIN. Please try again.");
        setPin(["","","",""]);
        setTimeout(() => { setStatus("idle"); refs[0].current && refs[0].current.focus(); }, 1200);
      }
    } catch(err) {
      setStatus("error");
      if (err.message==="NO_MASTER_URL") { setErrMsg("Configure Master URL below."); setShowSetup(true); }
      else setErrMsg("Connection failed. Check internet.");
      setPin(["","","",""]);
      setTimeout(() => { setStatus("idle"); refs[0].current && refs[0].current.focus(); }, 1500);
    }
  };

  const numPad = (n) => {
    if (n === "⌫") {
      const last = [...pin].reverse().findIndex(v=>v);
      if (last >= 0) { const idx=3-last; const np=[...pin]; np[idx]=""; setPin(np); refs[idx].current && refs[idx].current.focus(); }
    } else if (n !== "") {
      const empty = pin.findIndex(v=>!v);
      if (empty >= 0) handleDigit(empty, String(n));
    }
  };

  return (
    <div style={{fontFamily:"'DM Sans','Nunito',sans-serif",background:"#0A0E1A",minHeight:"100vh",maxWidth:430,margin:"0 auto",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:"24px 24px 60px"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        .pb{width:64px;height:74px;border-radius:16px;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);color:#E8EAF6;font-size:28px;font-weight:700;text-align:center;outline:none;transition:all .2s;font-family:inherit}
        .pb:focus{border-color:rgba(183,148,246,0.7);background:rgba(183,148,246,0.08);box-shadow:0 0 0 4px rgba(183,148,246,0.15)}
        .pb.f{border-color:#B794F6;background:rgba(183,148,246,0.1)}
        .pb.e{border-color:#FC814A;background:rgba(252,129,74,0.08)}
        .pb.s{border-color:#68D391;background:rgba(104,211,145,0.1)}
        @keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .fu{animation:fu .5s cubic-bezier(.16,1,.3,1) forwards}
        @keyframes sh{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-10px)}40%,80%{transform:translateX(10px)}}
        .sh{animation:sh .4s ease}
        @keyframes spin{to{transform:rotate(360deg)}}.sp{animation:spin .8s linear infinite}
        .si{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:11px 14px;color:#E8EAF6;font-size:13px;outline:none;transition:all .2s;font-family:inherit}
        .si:focus{border-color:rgba(183,148,246,0.6)}.si::placeholder{color:rgba(255,255,255,0.25)}
      `}</style>

      <div style={{textAlign:"center",marginBottom:40}} className="fu">
        <div style={{width:80,height:80,borderRadius:26,background:"linear-gradient(135deg,#B794F6,#7C5CBF)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,margin:"0 auto 16px",boxShadow:"0 8px 40px rgba(183,148,246,0.45)"}}>🏡</div>
        <div style={{fontFamily:"'DM Serif Display',serif",fontSize:32,color:"#E8EAF6",letterSpacing:-0.5}}>PS RE CRM</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,0.4)",marginTop:7}}>Enter your 4-digit PIN</div>
      </div>

      <div className={`fu ${status==="error"?"sh":""}`} style={{display:"flex",gap:12,marginBottom:28,justifyContent:"center"}}>
        {pin.map((digit,idx)=>(
          <input key={idx} ref={refs[idx]} type="tel" inputMode="numeric" maxLength={1}
            value={digit} onChange={e=>handleDigit(idx,e.target.value)}
            onKeyDown={e=>handleKey(idx,e)} onFocus={e=>e.target.select()}
            autoFocus={idx===0}
            className={`pb ${digit?"f":""} ${status==="error"?"e":""} ${status==="success"?"s":""}`}
          />
        ))}
      </div>

      {status==="loading" && <div style={{display:"flex",alignItems:"center",gap:8,color:"#B794F6",fontSize:13,fontWeight:600,marginBottom:20}}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="sp" style={{width:16,height:16}}><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>Verifying...</div>}
      {status==="success" && <div style={{color:"#68D391",fontSize:13,fontWeight:600,marginBottom:20}}>✅ Welcome! Loading your CRM...</div>}
      {errMsg && <div style={{background:"rgba(252,129,74,0.1)",border:"1px solid rgba(252,129,74,0.25)",borderRadius:12,padding:"10px 16px",fontSize:12,color:"#FC814A",fontWeight:500,marginBottom:20,textAlign:"center",maxWidth:280}}>⚠️ {errMsg}</div>}

      {status==="idle" && (
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,68px)",gap:10,marginBottom:24}} className="fu">
          {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((n,i)=>(
            <button key={i} onClick={()=>numPad(n)} disabled={n===""} style={{height:64,borderRadius:14,border:"1px solid rgba(255,255,255,0.08)",background:n==="⌫"?"rgba(252,129,74,0.08)":n===""?"transparent":"rgba(255,255,255,0.05)",color:n==="⌫"?"#FC814A":n===""?"transparent":"#E8EAF6",fontSize:n==="⌫"?20:22,fontWeight:600,cursor:n===""?"default":"pointer",transition:"all .15s",fontFamily:"inherit"}}>
              {n}
            </button>
          ))}
        </div>
      )}

      <button onClick={()=>setShowSetup(!showSetup)} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.3)",fontSize:12,marginBottom:showSetup?12:0}}>
        ⚙️ {showSetup?"Hide":"Configure"} Master Sheet URL
      </button>

      {showSetup && (
        <div style={{width:"100%",maxWidth:310,display:"flex",flexDirection:"column",gap:10,marginTop:8}}>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",textAlign:"center",lineHeight:1.6}}>Paste the Master Sheet Script URL<br/>(provided by your CRM admin)</div>
          <input value={masterUrl} onChange={e=>setMasterUrlS(e.target.value)} placeholder="https://script.google.com/macros/s/..." className="si"/>
          <button onClick={()=>{if(masterUrl.trim()){setMasterUrl(masterUrl.trim());setShowSetup(false);setErrMsg("");}}} style={{padding:"10px",borderRadius:11,border:"none",background:"linear-gradient(135deg,#B794F6,#7C5CBF)",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Save URL</button>
        </div>
      )}
    </div>
  );
}

function App() {
  const [session, setSession]   = useState(() => loadSession());
  const [db, setDb] = useState(() => loadDB());
  const [tab, setTab] = useState(0);
  const [toast, setToast] = useState(null);
  const [syncStatus, setSyncStatus] = useState("idle"); // idle | syncing | success | error
  // scriptUrl comes from agent's session (agentSheetUrl) automatically
  const [scriptUrl, setScriptUrlState] = useState(() => getScriptURL());
  const [lastSynced, setLastSynced] = useState(db.lastSynced);
  const [notifications, setNotifications] = useState([]);
  const [showNotifPanel, setShowNotifPanel] = useState(false);
  const [notifPermission, setNotifPermission] = useState(() => {
    try { return Notification.permission; } catch(e) { return "default"; }
  });

  const updateDB = useCallback((updater) => {
    setDb(prev => {
      const next = updater(prev);
      saveDB(next);
      return next;
    });
  }, []);

  const handleLogout = () => {
    clearSession();
    setSession(null);
    // Reset DB to empty on logout so next agent starts fresh
    setDb({ ...DEFAULT_DB });
    setScriptUrlState("");
  };

  const showToast = (msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  };

  // ── AUTO-PULL on app startup ──────────────────────────────
  useEffect(() => {
    const url = getScriptURL();
    if (!url) return;
    setSyncStatus("syncing");
    pullFromSheets(url).then(data => {
      if (data) {
        updateDB(d => ({
          ...d,
          customers: data.customers && data.customers.length > 0 ? data.customers : d.customers,
          followups: data.followups && data.followups.length > 0 ? data.followups : d.followups,
          projects:  data.projects  && data.projects.length  > 0 ? data.projects  : d.projects,
        }));
        const now = new Date().toLocaleTimeString();
        setLastSynced(now);
        setSyncStatus("success");
        setTimeout(() => setSyncStatus("idle"), 3000);
      }
    }).catch(() => {
      setSyncStatus("idle"); // silent fail on startup — don't alarm user
    });
  }, []); // runs once on mount

  // ── AUTO-PULL when app comes back to foreground ───────────
  useEffect(() => {
    const onVisible = () => {
      if (document.visibilityState === "visible") {
        const url = getScriptURL();
        if (!url) return;
        pullFromSheets(url).then(data => {
          if (data) {
            updateDB(d => ({
              ...d,
              customers: data.customers && data.customers.length > 0 ? data.customers : d.customers,
              followups: data.followups && data.followups.length > 0 ? data.followups : d.followups,
              projects:  data.projects  && data.projects.length  > 0 ? data.projects  : d.projects,
            }));
            const now = new Date().toLocaleTimeString();
            setLastSynced(now);
          }
        }).catch(() => {});
      }
    };
    document.addEventListener("visibilitychange", onVisible);
    return () => document.removeEventListener("visibilitychange", onVisible);
  }, []); // runs on tab/app focus

  // ── AUTO-PUSH 3 seconds after any DB change ───────────────
  useEffect(() => {
    if (!scriptUrl) return;
    const timer = setTimeout(() => {
      handleSync(false);
    }, 3000);
    return () => clearTimeout(timer);
  }, [db.customers.length, db.followups.length]);

  // ── SMART NOTIFICATION ENGINE ─────────────────────────────
  useEffect(() => {
    const buildNotifications = () => {
      const now = new Date();
      const todayStr = now.toISOString().split("T")[0];
      const notifs = [];

      // 1. Today's follow-ups
      const todayFUs = db.followups.filter(f =>
        f.scheduledDate === todayStr && f.status !== "Done"
      );
      if (todayFUs.length > 0) {
        const types = {};
        todayFUs.forEach(f => { types[f.followupType] = (types[f.followupType]||0)+1; });
        const summary = Object.entries(types).map(([t,c])=>`${c} ${t}`).join(", ");
        notifs.push({
          id: "today_fu",
          type: "followup",
          priority: "high",
          icon: "📅",
          title: `${todayFUs.length} Follow-up${todayFUs.length>1?"s":""} Today`,
          message: summary,
          color: "#63B3ED",
          action: 4, // Calendar tab
          time: "Today"
        });
      }

      // 2. Overdue follow-ups (scheduled before today, not done)
      const overdue = db.followups.filter(f => {
        return f.scheduledDate < todayStr && f.status !== "Done";
      });
      if (overdue.length > 0) {
        notifs.push({
          id: "overdue",
          type: "overdue",
          priority: "critical",
          icon: "⚠️",
          title: `${overdue.length} Overdue Follow-up${overdue.length>1?"s":""}`,
          message: "These were missed and need immediate attention",
          color: "#FC814A",
          action: 4,
          time: "Overdue"
        });
      }

      // 3. Birthdays today
      const birthdays = db.customers.filter(c => {
        if (!c.dob) return false;
        const b = new Date(c.dob);
        return b.getDate()===now.getDate() && b.getMonth()===now.getMonth();
      });
      if (birthdays.length > 0) {
        notifs.push({
          id: "birthdays",
          type: "birthday",
          priority: "high",
          icon: "🎂",
          title: `${birthdays.length} Birthday${birthdays.length>1?"s":""} Today!`,
          message: birthdays.map(c=>c.name).join(", "),
          color: "#FC814A",
          action: 5, // Engage tab
          time: "Today"
        });
      }

      // 4. Hot leads not contacted in 3+ days
      const staleHot = db.customers.filter(c => {
        if (c.enquiryType !== "Hot") return false;
        const fuList = db.followups.filter(f=>f.customerId===c.id);
        if (fuList.length === 0) {
          const created = new Date(c.createdAt||todayStr);
          return (now - created) > 3*86400000;
        }
        const last = fuList.sort((a,b)=>b.createdAt>a.createdAt?1:-1)[0];
        return (now - new Date(last.createdAt)) > 3*86400000;
      });
      if (staleHot.length > 0) {
        notifs.push({
          id: "stale_hot",
          type: "stale",
          priority: "medium",
          icon: "🔥",
          title: `${staleHot.length} Hot Lead${staleHot.length>1?"s":""} Need Attention`,
          message: staleHot.slice(0,2).map(c=>c.name).join(", ") + (staleHot.length>2?` +${staleHot.length-2} more`:""),
          color: "#F6AD55",
          action: 3, // Pipeline tab
          time: "3+ days ago"
        });
      }

      // 5. Tomorrow's follow-ups (prep reminder)
      const tomorrow = new Date(now); tomorrow.setDate(tomorrow.getDate()+1);
      const tomorrowStr = tomorrow.toISOString().split("T")[0];
      const tomorrowFUs = db.followups.filter(f =>
        f.scheduledDate === tomorrowStr && f.status !== "Done"
      );
      if (tomorrowFUs.length > 0) {
        notifs.push({
          id: "tomorrow_fu",
          type: "upcoming",
          priority: "low",
          icon: "🔔",
          title: `${tomorrowFUs.length} Follow-up${tomorrowFUs.length>1?"s":""} Tomorrow`,
          message: "Prepare for tomorrow's customer interactions",
          color: "#68D391",
          action: 4,
          time: "Tomorrow"
        });
      }

      // 6. No activity today nudge (if 0 follow-ups done)
      const doneTodayCount = db.followups.filter(f=>f.status==="Done" && f.scheduledDate===todayStr).length;
      if (doneTodayCount === 0 && db.customers.length > 0 && now.getHours() >= 11) {
        notifs.push({
          id: "nudge",
          type: "nudge",
          priority: "low",
          icon: "💪",
          title: "No Activity Logged Today",
          message: "Stay on top of your leads — log your first follow-up!",
          color: "#9A75E9",
          action: 2, // Log tab
          time: "Tip"
        });
      }

      setNotifications(notifs);

      // Browser push notification (if permission granted) — only at 9 AM
      if (notifPermission === "granted" && now.getHours() === 9 && now.getMinutes() < 5) {
        const lastDigest = localStorage.getItem("last_digest_date");
        if (lastDigest !== todayStr) {
          try {
            new Notification("🏡 PS RE CRM — Good Morning!", {
              body: `You have ${todayFUs.length} follow-up${todayFUs.length!==1?"s":""} today${birthdays.length>0?` & ${birthdays.length} birthday${birthdays.length!==1?"s":""}`:""}.`,
              icon: "/favicon.ico",
              badge: "/favicon.ico",
            });
            localStorage.setItem("last_digest_date", todayStr);
          } catch(e) {}
        }
      }
    };

    buildNotifications();
    // Rebuild every 5 minutes
    const interval = setInterval(buildNotifications, 5 * 60 * 1000);
    return () => clearInterval(interval);
  }, [db.customers.length, db.followups.length, db.followups.filter(f=>f.status==="Done").length]);

  const requestNotifPermission = async () => {
    try {
      const result = await Notification.requestPermission();
      setNotifPermission(result);
      if (result === "granted") {
        new Notification("🏡 PS RE CRM", { body: "Notifications enabled! You'll get daily reminders." });
      }
    } catch(e) {}
  };

  const handleSync = async (manual = true) => {
    const url = getScriptURL();
    if (!url) {
      if (manual) showToast("Set your Script URL in Settings first ⚙️", "error");
      return;
    }
    setSyncStatus("syncing");
    try {
      await syncToSheets(db, url);
      const now = new Date().toLocaleTimeString();
      setLastSynced(now);
      updateDB(d => ({ ...d, lastSynced: now }));
      setSyncStatus("success");
      if (manual) showToast("Synced to Google Sheets ✅");
      setTimeout(() => setSyncStatus("idle"), 3000);
    } catch (err) {
      setSyncStatus("error");
      if (manual) showToast("Sync failed — check your Script URL", "error");
      setTimeout(() => setSyncStatus("idle"), 3000);
    }
  };

  const handlePull = async () => {
    const url = getScriptURL();
    if (!url) { showToast("Set your Script URL in Settings first ⚙️", "error"); return; }
    setSyncStatus("syncing");
    try {
      const data = await pullFromSheets(url);
      updateDB(d => ({
        ...d,
        customers: data.customers && data.customers.length > 0 ? data.customers : d.customers,
        followups: data.followups && data.followups.length > 0 ? data.followups : d.followups,
        projects:  data.projects  && data.projects.length  > 0 ? data.projects  : d.projects,
      }));
      const now = new Date().toLocaleTimeString();
      setLastSynced(now);
      setSyncStatus("success");
      showToast(`✅ Pulled ${data.customers?.length || 0} customers, ${data.followups?.length || 0} follow-ups`);
      setTimeout(() => setSyncStatus("idle"), 3000);
    } catch (err) {
      setSyncStatus("error");
      showToast("Pull failed — check your Script URL", "error");
      setTimeout(() => setSyncStatus("idle"), 3000);
    }
  };

  const tabs = [
    { label: "Home",     icon: Icon.home },
    { label: "Add",      icon: Icon.addUser },
    { label: "Log",      icon: Icon.activity },
    { label: "Pipeline", icon: Icon.pipeline },
    { label: "Calendar", icon: Icon.calendar },
    { label: "Engage",   icon: Icon.heart },
    { label: "Settings", icon: Icon.settings },
  ];

  const syncColor = syncStatus === "syncing" ? "#F6AD55" : syncStatus === "success" ? "#68D391" : syncStatus === "error" ? "#FC814A" : scriptUrl ? "#68D391" : "rgba(255,255,255,0.2)";
  const syncLabel = syncStatus === "syncing" ? "Syncing…" : syncStatus === "success" ? "Synced" : syncStatus === "error" ? "Sync Error" : scriptUrl ? (lastSynced ? `Last: ${lastSynced}` : "Connected") : "Not connected";

  // Show PIN login if no active session
  if (!session) {
    return <PinLogin onLogin={(agent) => {
      saveSession(agent);
      const newSession = { agent, loginTime: Date.now() };
      setSession(newSession);
      // Load this agent's data and set their sheet URL
      const agentKey = `re_crm_data_${agent.id}`;
      try {
        const raw = localStorage.getItem(agentKey);
        setDb(raw ? { ...DEFAULT_DB, ...JSON.parse(raw) } : { ...DEFAULT_DB });
      } catch { setDb({ ...DEFAULT_DB }); }
      if (agent.agentSheetUrl) setScriptUrlState(agent.agentSheetUrl);
    }} />;
  }

  return (
    <div style={{ fontFamily: "'DM Sans','Nunito',sans-serif", background: "#0A0E1A", minHeight: "100vh", maxWidth: 430, margin: "0 auto", display: "flex", flexDirection: "column", height: "100vh" }}>

      <div style={{ background: "rgba(255,255,255,0.03)", borderBottom: "1px solid rgba(255,255,255,0.05)", padding: "6px 16px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <div style={{ width: 7, height: 7, borderRadius: "50%", background: syncColor, transition: "background 0.3s", boxShadow: scriptUrl ? `0 0 6px ${syncColor}` : "none" }} />
          <span style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", fontWeight: 500 }}>{syncLabel}</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          {/* Notification Bell */}
          <button onClick={() => setShowNotifPanel(true)} style={{ position: "relative", display: "flex", alignItems: "center", justifyContent: "center", padding: "4px 8px", borderRadius: 8, background: notifications.length > 0 ? "rgba(183,148,246,0.12)" : "transparent", border: notifications.length > 0 ? "1px solid rgba(183,148,246,0.25)" : "1px solid transparent", cursor: "pointer", color: notifications.length > 0 ? "#B794F6" : "rgba(255,255,255,0.3)", gap: 4 }}>
            {Icon.bell}
            {notifications.length > 0 && (
              <div style={{ minWidth: 16, height: 16, borderRadius: 99, background: notifications.some(n=>n.priority==="critical") ? "#FC814A" : "#B794F6", color: "#fff", fontSize: 9, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", padding: "0 4px" }}>
                {notifications.length}
              </div>
            )}
          </button>
          {scriptUrl && (
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={handlePull} title="Pull from Sheets" style={{ display: "flex", alignItems: "center", gap: 4, background: "none", border: "none", cursor: "pointer", color: "rgba(255,255,255,0.4)", fontSize: 11, fontWeight: 600, padding: "2px 6px", borderRadius: 6 }}>
                <span style={{ display: "inline-flex" }}>{Icon.download}</span> Pull
              </button>
              <button onClick={() => handleSync(true)} title="Push to Sheets" style={{ display: "flex", alignItems: "center", gap: 4, background: "none", border: "none", cursor: "pointer", color: "rgba(183,148,246,0.8)", fontSize: 11, fontWeight: 600, padding: "2px 6px", borderRadius: 6 }}>
                <span style={{ display: "inline-flex" }}>{Icon.upload}</span> Sync
              </button>
            </div>
          )}
        </div>
      </div>

      {/* Notification Panel Overlay */}
      {showNotifPanel && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", zIndex: 300, display: "flex", flexDirection: "column", justifyContent: "flex-start" }} onClick={() => setShowNotifPanel(false)} className="fade-in">
          <div style={{ background: "#0E1221", borderBottom: "1px solid rgba(255,255,255,0.08)", padding: "12px 16px 0", maxWidth: 430, width: "100%", margin: "0 auto" }} onClick={e=>e.stopPropagation()}>
            {/* Panel Header */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", paddingBottom: 12 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 18 }}>🔔</span>
                <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 18, color: "#E8EAF6" }}>Notifications</div>
                {notifications.length > 0 && <div style={{ background: "#B794F6", color: "#fff", fontSize: 10, fontWeight: 700, padding: "1px 7px", borderRadius: 99 }}>{notifications.length}</div>}
              </div>
              <button onClick={() => setShowNotifPanel(false)} style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, cursor: "pointer", color: "rgba(255,255,255,0.5)", padding: "4px 8px", fontSize: 11, display: "flex", alignItems: "center", gap: 4 }}>
                {Icon.dismiss} Close
              </button>
            </div>

            {/* Enable push notifications banner */}
            {notifPermission !== "granted" && (
              <div style={{ background: "rgba(183,148,246,0.08)", border: "1px solid rgba(183,148,246,0.2)", borderRadius: 12, padding: "10px 14px", marginBottom: 12, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 600, color: "#B794F6" }}>Enable Push Notifications</div>
                  <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", marginTop: 2 }}>Get daily 9 AM digest on your phone</div>
                </div>
                <button onClick={requestNotifPermission} style={{ padding: "6px 12px", borderRadius: 8, border: "none", background: "linear-gradient(135deg,#B794F6,#7C5CBF)", color: "#fff", fontSize: 11, fontWeight: 700, cursor: "pointer", flexShrink: 0 }}>Enable</button>
              </div>
            )}
            {notifPermission === "granted" && (
              <div style={{ background: "rgba(104,211,145,0.08)", border: "1px solid rgba(104,211,145,0.2)", borderRadius: 10, padding: "8px 12px", marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 14 }}>✅</span>
                <div style={{ fontSize: 11, color: "#68D391", fontWeight: 600 }}>Push notifications active — daily digest at 9 AM</div>
              </div>
            )}

            {/* Notification list */}
            <div style={{ maxHeight: "60vh", overflowY: "auto", display: "flex", flexDirection: "column", gap: 8, paddingBottom: 16 }}>
              {notifications.length === 0 && (
                <div style={{ textAlign: "center", padding: "32px 20px", color: "rgba(255,255,255,0.3)", fontSize: 13 }}>
                  <div style={{ fontSize: 32, marginBottom: 8 }}>✨</div>
                  All clear! No alerts right now.
                </div>
              )}
              {notifications.map((n, i) => (
                <div key={n.id} onClick={() => { setShowNotifPanel(false); setTab(n.action); }} style={{ display: "flex", gap: 12, padding: "12px 14px", borderRadius: 14, background: "rgba(255,255,255,0.04)", border: `1px solid ${n.priority==="critical" ? "rgba(252,129,74,0.3)" : n.priority==="high" ? `${n.color}30` : "rgba(255,255,255,0.07)"}`, cursor: "pointer", transition: "all .15s", alignItems: "flex-start" }}
                  onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.08)"}
                  onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,0.04)"}>
                  {/* Priority indicator */}
                  <div style={{ width: 40, height: 40, borderRadius: 12, background: `${n.color}20`, border: `1px solid ${n.color}40`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0 }}>{n.icon}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 3 }}>
                      <div style={{ fontWeight: 700, color: "#E8EAF6", fontSize: 13, lineHeight: 1.3 }}>{n.title}</div>
                      <span style={{ fontSize: 9, color: n.color, fontWeight: 700, background: `${n.color}15`, padding: "2px 6px", borderRadius: 99, border: `1px solid ${n.color}30`, flexShrink: 0, marginLeft: 6 }}>{n.time}</span>
                    </div>
                    <div style={{ fontSize: 11, color: "rgba(255,255,255,0.45)", lineHeight: 1.5 }}>{n.message}</div>
                    <div style={{ fontSize: 10, color: n.color, marginTop: 5, fontWeight: 600 }}>Tap to view →</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Page Content */}
      <div style={{ flex: 1, overflowY: "auto", paddingBottom: 70 }}>
        {tab === 0 && <Dashboard db={db} setTab={setTab} notifications={notifications} setShowNotifPanel={setShowNotifPanel} />}
        {tab === 1 && <AddCustomer db={db} updateDB={updateDB} showToast={showToast} />}
        {tab === 2 && <ActivityLog db={db} updateDB={updateDB} showToast={showToast} />}
        {tab === 3 && <Pipeline db={db} updateDB={updateDB} showToast={showToast} />}
        {tab === 4 && <CalendarView db={db} updateDB={updateDB} showToast={showToast} />}
        {tab === 5 && <Engage db={db} showToast={showToast} />}
        {tab === 6 && <Settings db={db} updateDB={updateDB} showToast={showToast} scriptUrl={scriptUrl} setScriptUrlState={setScriptUrlState} handleSync={handleSync} handlePull={handlePull} syncStatus={syncStatus} lastSynced={lastSynced} onLogout={handleLogout} />}
      </div>

      {/* Bottom Nav */}
      <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 430, background: "rgba(10,14,26,0.97)", backdropFilter: "blur(20px)", borderTop: "1px solid rgba(255,255,255,0.07)", display: "flex", zIndex: 100 }}>
        {tabs.map((t, i) => (
          <button key={i} onClick={() => setTab(i)} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "10px 0 8px", border: "none", background: "transparent", cursor: "pointer", color: tab === i ? "#B794F6" : "rgba(255,255,255,0.3)", transition: "color 0.2s", gap: 3, position: "relative" }}>
            {i === 2 && (
              <div style={{ position: "absolute", top: -18, background: "linear-gradient(135deg,#B794F6,#7C5CBF)", borderRadius: "50%", padding: 12, boxShadow: "0 4px 20px rgba(183,148,246,0.5)", color: "#fff", border: "3px solid #0A0E1A" }}>
                {t.icon}
              </div>
            )}
            {i !== 2 && t.icon}
            {i === 2 && <div style={{ height: 20 }} />}
            <span style={{ fontSize: i === 6 ? 9 : 10, fontWeight: 600, letterSpacing: 0.3 }}>{t.label}</span>
            {tab === i && i !== 2 && <div style={{ position: "absolute", top: 0, left: "50%", transform: "translateX(-50%)", width: 24, height: 2, background: "#B794F6", borderRadius: 2 }} />}
            {/* Settings badge if not connected */}
            {i === 6 && !scriptUrl && <div style={{ position: "absolute", top: 8, right: "18%", width: 6, height: 6, borderRadius: "50%", background: "#FC814A" }} />}
            {/* Home badge if notifications exist */}
            {i === 0 && notifications.some(n=>n.priority==="critical") && <div style={{ position: "absolute", top: 8, right: "18%", width: 6, height: 6, borderRadius: "50%", background: "#FC814A", boxShadow: "0 0 6px #FC814A" }} />}
          </button>
        ))}
      </div>

      {toast && (
        <div className="toast" style={{ background: toast.type === "success" ? "rgba(104,211,145,0.95)" : toast.type === "info" ? "rgba(183,148,246,0.95)" : "rgba(252,129,74,0.95)", color: "#000" }}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}


// ============================================================
// PIPELINE — Lead Kanban Board
// ============================================================
const PIPELINE_STAGES = [
  { id: "new",          label: "New Enquiry",  color: "#63B3ED", bg: "rgba(99,179,237,0.12)",  emoji: "🌱" },
  { id: "contacted",    label: "Contacted",    color: "#F6AD55", bg: "rgba(246,173,85,0.12)",  emoji: "📞" },
  { id: "sitevisit",   label: "Site Visit",   color: "#68D391", bg: "rgba(104,211,145,0.12)", emoji: "🏗️" },
  { id: "negotiation",  label: "Negotiation",  color: "#9A75E9", bg: "rgba(154,117,233,0.12)", emoji: "🤝" },
  { id: "booked",       label: "Booked",       color: "#FC814A", bg: "rgba(252,129,74,0.12)",  emoji: "✅" },
  { id: "registered",   label: "Registered",   color: "#48D1CC", bg: "rgba(72,209,204,0.12)",  emoji: "🏆" },
];

function Pipeline({ db, updateDB, showToast }) {
  const [activeStage, setActiveStage] = useState("new");
  const [selectedCustomer, setSelectedCustomer] = useState(null);
  const [filterEnquiry, setFilterEnquiry] = useState("All");

  // Get pipeline stage for a customer (default: "new")
  const getStage = (c) => c.pipelineStage || "new";

  // Move customer to a stage
  const moveStage = (customerId, newStage) => {
    updateDB(db => ({
      ...db,
      customers: db.customers.map(c =>
        c.id === customerId ? { ...c, pipelineStage: newStage, pipelineUpdatedAt: new Date().toISOString() } : c
      )
    }));
    showToast(`Moved to ${PIPELINE_STAGES.find(s=>s.id===newStage)?.label} ✅`);
    setSelectedCustomer(prev => prev ? { ...prev, pipelineStage: newStage } : null);
  };

  const stageCustomers = (stageId) => {
    let custs = db.customers.filter(c => getStage(c) === stageId);
    if (filterEnquiry !== "All") custs = custs.filter(c => c.enquiryType === filterEnquiry);
    return custs;
  };

  const totalValue = (stageId) => {
    const custs = stageCustomers(stageId);
    return custs.length;
  };

  const activeStageObj = PIPELINE_STAGES.find(s => s.id === activeStage);
  const activeCusts = stageCustomers(activeStage);
  const currentStageIdx = PIPELINE_STAGES.findIndex(s => s.id === activeStage);

  // Last follow-up for a customer
  const lastFU = (custId) => {
    const fus = db.followups.filter(f => f.customerId === custId).sort((a,b) => b.createdAt > a.createdAt ? 1 : -1);
    return fus[0] || null;
  };

  // Days since last contact
  const daysSince = (dateStr) => {
    if (!dateStr) return null;
    const diff = Date.now() - new Date(dateStr).getTime();
    return Math.floor(diff / 86400000);
  };

  return (
    <div style={{ padding: "0 0 16px" }} className="slide-up">
      {/* Header */}
      <div style={{ padding: "20px 16px 12px" }}>
        <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 24, color: "#E8EAF6" }}>Lead <span style={{ color: "#B794F6" }}>Pipeline</span></div>
        <div style={{ fontSize: 13, color: "rgba(255,255,255,0.4)", marginTop: 2 }}>Track every deal from enquiry to registration</div>
      </div>

      {/* Pipeline Summary Bar — scrollable */}
      <div style={{ display: "flex", gap: 8, overflowX: "auto", padding: "0 16px 14px", scrollbarWidth: "none" }}>
        {PIPELINE_STAGES.map((stage, idx) => {
          const count = stageCustomers(stage.id).length;
          const isActive = activeStage === stage.id;
          return (
            <div key={stage.id} onClick={() => setActiveStage(stage.id)} style={{ flexShrink: 0, display: "flex", flexDirection: "column", alignItems: "center", gap: 4, cursor: "pointer" }}>
              <div style={{ width: 52, height: 52, borderRadius: 14, background: isActive ? stage.bg : "rgba(255,255,255,0.04)", border: `2px solid ${isActive ? stage.color : "rgba(255,255,255,0.07)"}`, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", transition: "all .2s", boxShadow: isActive ? `0 0 16px ${stage.color}40` : "none" }}>
                <div style={{ fontSize: 16 }}>{stage.emoji}</div>
                <div style={{ fontSize: 13, fontWeight: 700, color: isActive ? stage.color : "rgba(255,255,255,0.5)" }}>{count}</div>
              </div>
              <div style={{ fontSize: 9, fontWeight: 600, color: isActive ? stage.color : "rgba(255,255,255,0.3)", letterSpacing: 0.3, textAlign: "center", maxWidth: 52, lineHeight: 1.3 }}>{stage.label}</div>
              {isActive && <div style={{ width: 20, height: 2, borderRadius: 2, background: stage.color }} />}
            </div>
          );
        })}
      </div>

      {/* Filter + Stage nav */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 16px", marginBottom: 12 }}>
        <div style={{ display: "flex", gap: 6 }}>
          {["All", "Hot", "Warm", "Cold"].map(f => (
            <button key={f} onClick={() => setFilterEnquiry(f)} style={{ padding: "4px 10px", borderRadius: 99, border: `1px solid ${filterEnquiry === f ? activeStageObj.color : "rgba(255,255,255,0.1)"}`, background: filterEnquiry === f ? activeStageObj.bg : "transparent", color: filterEnquiry === f ? activeStageObj.color : "rgba(255,255,255,0.4)", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>{f}</button>
          ))}
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          <button onClick={() => currentStageIdx > 0 && setActiveStage(PIPELINE_STAGES[currentStageIdx-1].id)} style={{ padding: 6, borderRadius: 8, border: "1px solid rgba(255,255,255,0.1)", background: "transparent", color: "rgba(255,255,255,0.4)", cursor: "pointer", display: "flex" }}>{Icon.arrowLeft}</button>
          <button onClick={() => currentStageIdx < PIPELINE_STAGES.length-1 && setActiveStage(PIPELINE_STAGES[currentStageIdx+1].id)} style={{ padding: 6, borderRadius: 8, border: "1px solid rgba(255,255,255,0.1)", background: "transparent", color: "rgba(255,255,255,0.4)", cursor: "pointer", display: "flex" }}>{Icon.arrowRight}</button>
        </div>
      </div>

      {/* Stage Title */}
      <div style={{ padding: "0 16px", marginBottom: 10, display: "flex", alignItems: "center", gap: 8 }}>
        <div style={{ width: 8, height: 8, borderRadius: "50%", background: activeStageObj.color, boxShadow: `0 0 8px ${activeStageObj.color}` }} />
        <div style={{ fontWeight: 700, color: activeStageObj.color, fontSize: 14 }}>{activeStageObj.label}</div>
        <div style={{ fontSize: 12, color: "rgba(255,255,255,0.3)" }}>— {activeCusts.length} lead{activeCusts.length !== 1 ? "s" : ""}</div>
      </div>

      {/* Lead Cards */}
      <div style={{ padding: "0 16px", display: "flex", flexDirection: "column", gap: 10 }}>
        {activeCusts.length === 0 && (
          <div style={{ textAlign: "center", padding: "40px 20px", background: "rgba(255,255,255,0.03)", borderRadius: 16, border: "1px dashed rgba(255,255,255,0.08)" }}>
            <div style={{ fontSize: 32, marginBottom: 10 }}>{activeStageObj.emoji}</div>
            <div style={{ color: "rgba(255,255,255,0.4)", fontSize: 13 }}>No leads in {activeStageObj.label}</div>
            <div style={{ color: "rgba(255,255,255,0.25)", fontSize: 12, marginTop: 4 }}>Move leads here from other stages</div>
          </div>
        )}
        {activeCusts.map((c, i) => {
          const fu = lastFU(c.id);
          const days = fu ? daysSince(fu.createdAt) : daysSince(c.createdAt);
          const isStale = days !== null && days > 3;
          return (
            <div key={c.id} onClick={() => setSelectedCustomer(c)} style={{ background: "rgba(255,255,255,0.04)", border: `1px solid ${isStale ? "rgba(252,129,74,0.3)" : "rgba(255,255,255,0.07)"}`, borderLeft: `4px solid ${activeStageObj.color}`, borderRadius: 14, padding: "14px", cursor: "pointer", transition: "all .2s", position: "relative" }}
              onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,0.07)"}
              onMouseLeave={e => e.currentTarget.style.background = "rgba(255,255,255,0.04)"}>
              {isStale && <div style={{ position: "absolute", top: 10, right: 10, fontSize: 10, background: "rgba(252,129,74,0.15)", color: "#FC814A", border: "1px solid rgba(252,129,74,0.3)", borderRadius: 99, padding: "2px 7px", fontWeight: 600 }}>⚠️ {days}d ago</div>}
              <div style={{ display: "flex", alignItems: "flex-start", gap: 10, marginBottom: 10 }}>
                <div style={{ width: 36, height: 36, borderRadius: "50%", background: `linear-gradient(135deg,${activeStageObj.color}40,${activeStageObj.color}20)`, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, color: activeStageObj.color, fontSize: 15, flexShrink: 0 }}>
                  {c.name.charAt(0).toUpperCase()}
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 700, color: "#E8EAF6", fontSize: 14, marginBottom: 2 }}>{c.name}</div>
                  <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", display: "flex", gap: 8, flexWrap: "wrap" }}>
                    <span>{c.mobile}</span>
                    {c.propertyType && <span>· {c.propertyType}</span>}
                    {c.budget && <span>· {c.budget}</span>}
                  </div>
                </div>
              </div>
              {/* Tags row */}
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 10 }}>
                <span className="pill" style={{ background: c.enquiryType === "Hot" ? "rgba(252,129,74,0.15)" : c.enquiryType === "Warm" ? "rgba(246,173,85,0.15)" : "rgba(99,179,237,0.15)", color: c.enquiryType === "Hot" ? "#FC814A" : c.enquiryType === "Warm" ? "#F6AD55" : "#63B3ED", border: `1px solid ${c.enquiryType === "Hot" ? "#FC814A" : c.enquiryType === "Warm" ? "#F6AD55" : "#63B3ED"}` }}>{c.enquiryType || "Warm"}</span>
                {c.location && <span className="pill" style={{ background: "rgba(255,255,255,0.06)", color: "rgba(255,255,255,0.5)", border: "1px solid rgba(255,255,255,0.1)" }}>📍 {c.location}</span>}
                {fu && <span className="pill" style={{ background: "rgba(183,148,246,0.1)", color: "#B794F6", border: "1px solid rgba(183,148,246,0.2)" }}>📋 {fu.followupType}</span>}
              </div>
              {/* Action buttons */}
              <div style={{ display: "flex", gap: 6 }}>
                <a href={`tel:${c.mobile?.replace(/\D/g,"")}`} onClick={e=>e.stopPropagation()} style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", gap:4, padding:"7px", borderRadius:9, background:"rgba(99,179,237,0.1)", border:"1px solid rgba(99,179,237,0.2)", color:"#63B3ED", fontSize:12, fontWeight:600, textDecoration:"none" }}>{Icon.phone} Call</a>
                <a href={`https://wa.me/${c.mobile?.replace(/\D/g,"")}`} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", gap:4, padding:"7px", borderRadius:9, background:"rgba(37,211,102,0.1)", border:"1px solid rgba(37,211,102,0.2)", color:"#25D366", fontSize:12, fontWeight:600, textDecoration:"none" }}>{Icon.whatsapp} WA</a>
                <button onClick={e=>{e.stopPropagation(); setSelectedCustomer(c);}} style={{ flex:2, display:"flex", alignItems:"center", justifyContent:"center", gap:4, padding:"7px", borderRadius:9, background:activeStageObj.bg, border:`1px solid ${activeStageObj.color}40`, color:activeStageObj.color, fontSize:12, fontWeight:600, cursor:"pointer" }}>Move Stage →</button>
              </div>
            </div>
          );
        })}
      </div>

      {/* Move Stage Modal */}
      {selectedCustomer && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.8)", zIndex:200, display:"flex", alignItems:"flex-end", justifyContent:"center" }} onClick={() => setSelectedCustomer(null)} className="fade-in">
          <div style={{ width:"100%", maxWidth:430, background:"#131829", borderRadius:"20px 20px 0 0", padding:"20px 16px 34px", border:"1px solid rgba(255,255,255,0.1)" }} onClick={e=>e.stopPropagation()}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
              <div style={{ fontFamily:"'DM Serif Display',serif", fontSize:18, color:"#E8EAF6" }}>Move Lead</div>
              <button onClick={() => setSelectedCustomer(null)} style={{ background:"none", border:"none", cursor:"pointer", color:"rgba(255,255,255,0.5)", padding:4 }}>{Icon.close}</button>
            </div>
            <div style={{ fontSize:13, color:"rgba(255,255,255,0.5)", marginBottom:18 }}>{selectedCustomer.name} · {selectedCustomer.mobile}</div>

            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {PIPELINE_STAGES.map(stage => {
                const isCurrent = getStage(selectedCustomer) === stage.id;
                return (
                  <button key={stage.id} onClick={() => { moveStage(selectedCustomer.id, stage.id); setSelectedCustomer(null); }} style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 14px", borderRadius:12, border:`1px solid ${isCurrent ? stage.color : "rgba(255,255,255,0.07)"}`, background: isCurrent ? stage.bg : "rgba(255,255,255,0.03)", cursor:"pointer", transition:"all .15s" }}>
                    <div style={{ width:32, height:32, borderRadius:10, background:stage.bg, display:"flex", alignItems:"center", justifyContent:"center", fontSize:16 }}>{stage.emoji}</div>
                    <div style={{ flex:1, textAlign:"left" }}>
                      <div style={{ fontWeight:600, color: isCurrent ? stage.color : "#E8EAF6", fontSize:14 }}>{stage.label}</div>
                      <div style={{ fontSize:11, color:"rgba(255,255,255,0.35)" }}>{stageCustomers(stage.id).length} leads in this stage</div>
                    </div>
                    {isCurrent && <div style={{ fontSize:11, background:stage.bg, color:stage.color, border:`1px solid ${stage.color}`, borderRadius:99, padding:"2px 8px", fontWeight:700 }}>Current</div>}
                    {!isCurrent && <div style={{ color:"rgba(255,255,255,0.3)" }}>{Icon.arrowRight}</div>}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Settings({ db, updateDB, showToast, scriptUrl, setScriptUrlState, handleSync, handlePull, syncStatus, lastSynced, onLogout }) {
  const [urlInput, setUrlInput] = useState(scriptUrl);
  const [copied, setCopied] = useState(false);

  const saveUrl = () => {
    setScriptURL(urlInput.trim());
    setScriptUrlState(urlInput.trim());
    showToast("Script URL saved! ✅");

  const copyScript = () => {
    navigator.clipboard.writeText(APPS_SCRIPT_CODE);
    setCopied(true);
    setTimeout(() => setCopied(false), 2500);
    showToast("Apps Script code copied! 📋");

  const exportCSV = (table) => {
    const rows = db[table];
    if (!rows || rows.length === 0) { showToast("No data to export", "error"); return; }
    const headers = Object.keys(rows[0]);
    const csv = [headers.join(","), ...rows.map(r => headers.map(h => `"${(r[h]||"").toString().replace(/"/g,'""')}"`).join(","))].join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);

function AddCustomer({ db, updateDB, showToast }) {

  const [errors, setErrors] = useState({});
  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

    const e = {};
    if (!form.name.trim()) e.name = "Required";
    if (!form.mobile.trim()) e.mobile = "Required";
    if (Object.keys(e).length) { setErrors(e); return; }
    updateDB(db => ({ ...db, customers: [...db.customers, { ...form, id: genId(), createdAt: today() }] }));

function CalendarView({ db, updateDB, showToast }) {
  const t = todayDisplay();
  const [month, setMonth] = useState(t.month);
  const [year, setYear] = useState(t.year);
  const [selected, setSelected] = useState(null);
  const [modalFU, setModalFU] = useState(null);
  const [rescheduleDate, setRescheduleDate] = useState("");
  const [rescheduleTime, setRescheduleTime] = useState("");
  const [noteText, setNoteText] = useState("");

  const days = daysInMonth(month, year);
  const firstDay = firstDayOfMonth(month, year);

  const fuMap = {};
  db.followups.forEach(fu => {
    const d = new Date(fu.scheduledDate);
    if (d.getMonth()===month && d.getFullYear()===year) {
      const day=d.getDate();
      if (!fuMap[day]) fuMap[day]=[];
      fuMap[day].push(fu);
    }
  });
  db.customers.forEach(c => {
    if (c.dob) {
      const b=new Date(c.dob);
      if (b.getMonth()===month) {
        const day=b.getDate();
        if (!fuMap[day]) fuMap[day]=[];
        fuMap[day].push({__bday:true,customerName:c.name,mobile:c.mobile,id:"b"+c.id});
      }
    }
  });

  const selectedFUs = selected ? (fuMap[selected]||[]) : [];
  const years = Array.from({length:3},(_,i)=>t.year-1+i);

  const markDone = (fu) => {
    updateDB(db=>({...db,followups:db.followups.map(f=>f.id===fu.id?{...f,status:"Done",doneNotes:noteText}:f)}));
    showToast("Marked done & syncing ✅"); setModalFU(null); setNoteText("");
  };
  const doReschedule = (fu) => {
    if (!rescheduleDate) { showToast("Pick a reschedule date","error"); return; }
    updateDB(db=>({...db,followups:db.followups.map(f=>f.id===fu.id?{...f,scheduledDate:rescheduleDate,scheduledTime:rescheduleTime||f.scheduledTime,status:"Rescheduled"}:f)}));
    showToast("Rescheduled & syncing 📅"); setModalFU(null); setRescheduleDate(""); setRescheduleTime("");
  };

  return (
    <div style={{ padding:"0 16px 16px" }} className="slide-up">
      <div style={{ padding:"20px 0 16px" }}>
        <div style={{ fontFamily:"'DM Serif Display',serif",fontSize:24,color:"#E8EAF6" }}>Intelligence <span style={{color:"#B794F6"}}>Calendar</span></div>
        <div style={{ fontSize:13,color:"rgba(255,255,255,0.4)",marginTop:2 }}>Control tower for all your follow-ups</div>
      </div>
      <div style={{display:"flex",gap:10,marginBottom:16}}>
        <select value={month} onChange={e=>setMonth(parseInt(e.target.value))} className="input-field" style={{flex:2}}>
          {MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}
        </select>
        <select value={year} onChange={e=>setYear(parseInt(e.target.value))} className="input-field" style={{flex:1}}>
          {years.map(y=><option key={y} value={y}>{y}</option>)}
        </select>
      </div>

      <div className="card" style={{padding:"12px 8px"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:6}}>
          {DAYS_SHORT.map(d=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:700,color:"rgba(183,148,246,0.6)",letterSpacing:.5,padding:"4px 0"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"3px 2px"}}>
          {Array.from({length:firstDay}).map((_,i)=><div key={"e"+i} />)}
          {Array.from({length:days}).map((_,i)=>{
            const day=i+1;
            const dayFUs=fuMap[day]||[];
            const actualFUs=dayFUs.filter(f=>!f.__bday);
            const bdayFUs=dayFUs.filter(f=>f.__bday);
            const isToday=day===t.day&&month===t.month&&year===t.year;
            const isSelected=selected===day;
            const typeCounts={};
            actualFUs.forEach(f=>{ typeCounts[f.followupType]=(typeCounts[f.followupType]||0)+1; });
            return (
              <div key={day} onClick={()=>setSelected(isSelected?null:day)} style={{borderRadius:10,padding:"5px 3px",cursor:dayFUs.length>0?"pointer":"default",background:isSelected?"rgba(183,148,246,0.15)":isToday?"rgba(183,148,246,0.08)":"transparent",border:isToday?"1px solid rgba(183,148,246,0.4)":isSelected?"1px solid rgba(183,148,246,0.5)":"1px solid transparent",minHeight:52,transition:"all .15s"}}>
                <div style={{textAlign:"center",fontSize:12,fontWeight:isToday?700:500,color:isToday?"#B794F6":"rgba(255,255,255,0.7)",marginBottom:3}}>{day}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:2,justifyContent:"center"}}>
                  {Object.entries(typeCounts).slice(0,3).map(([type,cnt],ti)=>{
                    const colors=FU_COLORS[type];
                    return <div key={ti} style={{display:"flex",alignItems:"center",gap:1}}><div style={{width:5,height:5,borderRadius:"50%",background:colors?.dot||"#999"}} />{cnt>1&&<span style={{fontSize:8,color:colors?.text||"#999",fontWeight:700}}>{cnt}</span>}</div>;
                  })}
                  {bdayFUs.length>0&&<span style={{fontSize:9}}>🎂</span>}
                </div>
                {actualFUs.length>0&&<div style={{textAlign:"center",fontSize:8,color:"rgba(255,255,255,0.3)",marginTop:1}}>{actualFUs.length} {actualFUs.length===1?"FU":"FUs"}</div>}
              </div>
            );
          })}
        </div>
      </div>

      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:12}}>
        {Object.entries(FU_COLORS).map(([type,colors])=>(
          <div key={type} style={{display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:colors.dot}} />
            <span style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>{FU_ABBR[type]}</span>

      {selected && selectedFUs.length > 0 && (

            {selectedFUs.map((fu,i)=>{

                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                    <span style={{fontSize:16}}>🎂</span>
                    <div>
                      <div style={{fontWeight:600,color:"#E8EAF6",fontSize:14}}>{fu.customerName}</div>
                      <div style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>{fu.mobile} · Birthday</div>

                  <div style={{display:"flex",gap:8}}>
                    <a href={`tel:${fu.mobile.replace(/\D/g,"")}`} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"8px",borderRadius:10,background:"rgba(99,179,237,0.1)",border:"1px solid rgba(99,179,237,0.2)",color:"#63B3ED",fontSize:13,fontWeight:600,textDecoration:"none"}}>{Icon.phone} Call</a>

                  </div>

              const cust=db.customers.find(c=>c.id===fu.customerId);
              const colors=FU_COLORS[fu.followupType]||{};
              return (

  const buildMsg = (cust) => {
    const tmpl=selectedTemplate?db.waTemplates.find(t=>t.id===selectedTemplate)?.text:customMsg;
    if (!tmpl) return "";
    return tmpl.replace(/{name}/g, cust.name);
  };

  return (
    <div style={{ padding:"0 16px 16px" }} className="slide-up">
      <div style={{ padding:"20px 0 16px" }}>
        <div style={{ fontFamily:"'DM Serif Display',serif",fontSize:24,color:"#E8EAF6" }}>Customer <span style={{color:"#B794F6"}}>Engage</span></div>
        <div style={{ fontSize:13,color:"rgba(255,255,255,0.4)",marginTop:2 }}>Celebrate & broadcast with your customers</div>
      </div>
      <div style={{display:"flex",background:"rgba(255,255,255,0.04)",borderRadius:12,padding:4,marginBottom:18,border:"1px solid rgba(255,255,255,0.07)"}}>
        {[{id:"birthdays",label:"🎂 Birthdays"},{id:"broadcast",label:"📢 Broadcast"}].map(s=>(
          <button key={s.id} onClick={()=>setActiveSection(s.id)} style={{flex:1,padding:"9px",borderRadius:9,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:activeSection===s.id?"linear-gradient(135deg,#B794F6,#7C5CBF)":"transparent",color:activeSection===s.id?"#fff":"rgba(255,255,255,0.4)",transition:"all .2s"}}>{s.label}</button>
        ))}
      </div>

      {activeSection==="birthdays" && (
        <div className="fade-in">
          {birthdays.length===0?(
            <div className="card" style={{textAlign:"center",padding:32}}>
              <div style={{fontSize:36,marginBottom:10}}>🎉</div>
              <div style={{color:"#E8EAF6",fontWeight:600,marginBottom:6}}>No birthdays today!</div>
              <div style={{color:"rgba(255,255,255,0.4)",fontSize:13}}>Add DOB when creating customers to see birthday alerts</div>
            </div>
          ):(
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,background:"rgba(252,129,74,0.1)",border:"1px solid rgba(252,129,74,0.25)",borderRadius:12,padding:"10px 14px"}}>
                <span style={{fontSize:20}}>🎂</span>
                <div style={{fontWeight:600,color:"#FC814A",fontSize:14}}>{birthdays.length} birthday{birthdays.length>1?"s":""} today!</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {birthdays.map((c,i)=>(
                  <div key={i} className="card" style={{borderLeft:"3px solid #FC814A"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <div style={{width:38,height:38,borderRadius:"50%",background:"linear-gradient(135deg,rgba(252,129,74,0.3),rgba(183,148,246,0.3))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,color:"#E8EAF6"}}>{c.name.charAt(0).toUpperCase()}</div>
                        <div>
                          <div style={{fontWeight:600,color:"#E8EAF6",fontSize:14}}>{c.name}</div>
                          <div style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>{c.mobile} · {c.propertyType}</div>
                        </div>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:8}}>
                      <a href={`tel:${c.mobile.replace(/\D/g,"")}`} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:5,padding:"9px",borderRadius:10,background:"rgba(99,179,237,0.1)",border:"1px solid rgba(99,179,237,0.25)",color:"#63B3ED",fontSize:13,fontWeight:600,textDecoration:"none"}}>{Icon.phone} Call</a>
                      <a href={`https://wa.me/${c.mobile.replace(/\D/g,"")}?text=${encodeURIComponent(`🎂 Many Happy Returns of the day, ${c.name}! Wishing you a wonderful birthday! 🎉 – Your Real Estate Partner`)}`} target="_blank" rel="noreferrer" style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:5,padding:"9px",borderRadius:10,background:"rgba(37,211,102,0.1)",border:"1px solid rgba(37,211,102,0.25)",color:"#25D366",fontSize:13,fontWeight:600,textDecoration:"none"}}>{Icon.whatsapp} Wish</a>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {activeSection==="broadcast" && (
        <div className="fade-in">
          <div className="card" style={{marginBottom:14}}>
            <div className="section-title">WhatsApp Templates</div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
              {db.waTemplates.map(t=>(
                <div key={t.id} onClick={()=>{setSelectedTemplate(t.id);setCustomMsg("");}} style={{padding:"10px 12px",borderRadius:10,border:`1px solid ${selectedTemplate===t.id?"rgba(183,148,246,0.5)":"rgba(255,255,255,0.08)"}`,background:selectedTemplate===t.id?"rgba(183,148,246,0.08)":"transparent",cursor:"pointer",transition:"all .2s"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{fontWeight:600,color:"#E8EAF6",fontSize:13}}>{t.name}</div>
                    {selectedTemplate===t.id&&<div style={{width:16,height:16,borderRadius:"50%",background:"#B794F6",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff"}}>{Icon.check}</div>}
                  </div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:4,lineHeight:1.5}}>{t.text.slice(0,80)}...</div>
                </div>
              ))}
            </div>
            <div>
              <div className="label">Or type a custom message</div>
              <textarea value={customMsg} onChange={e=>{setCustomMsg(e.target.value);setSelectedTemplate(null);}} placeholder="Type your message... Use {name} to personalize" className="input-field" rows={3} style={{resize:"none"}} />
            </div>
          </div>

          <div className="card" style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div className="section-title" style={{marginBottom:0}}>Select Customers</div>
              <button onClick={()=>setSelectedCustomers(allCustomers.length===selectedCustomers.length?[]:allCustomers.map(c=>c.id))} style={{fontSize:11,color:"#B794F6",background:"none",border:"none",cursor:"pointer",fontWeight:600}}>
                {allCustomers.length===selectedCustomers.length?"Deselect All":"Select All"}
              </button>
            </div>
            <div style={{position:"relative",marginBottom:10}}>
              <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"rgba(255,255,255,0.4)"}}>{Icon.search}</div>
              <input value={searchBroadcast} onChange={e=>setSearchBroadcast(e.target.value)} placeholder="Search customers..." className="input-field" style={{paddingLeft:36}} />
            </div>
            <div style={{maxHeight:220,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
              {allCustomers.length===0&&<div style={{textAlign:"center",padding:20,color:"rgba(255,255,255,0.3)",fontSize:13}}>No customers yet.</div>}
              {allCustomers.map(c=>{
                const sel=selectedCustomers.includes(c.id);
                return (
                  <div key={c.id} onClick={()=>toggleCustomer(c.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:10,cursor:"pointer",background:sel?"rgba(183,148,246,0.08)":"transparent",border:`1px solid ${sel?"rgba(183,148,246,0.3)":"rgba(255,255,255,0.06)"}`,transition:"all .15s"}}>
                    <div style={{width:18,height:18,borderRadius:5,border:`2px solid ${sel?"#B794F6":"rgba(255,255,255,0.2)"}`,background:sel?"#B794F6":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}}>
                      {sel&&<svg viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" style={{width:11,height:11}}><polyline points="20,6 9,17 4,12"/></svg>}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,color:"#E8EAF6",fontSize:13}}>{c.name}</div>
                      <div style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>{c.mobile}</div>
                    </div>
                    {sel&&(
                      <a href={`https://wa.me/${c.mobile.replace(/\D/g,"")}?text=${encodeURIComponent(buildMsg(c))}`} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} style={{padding:"5px 8px",borderRadius:8,background:"rgba(37,211,102,0.1)",border:"1px solid rgba(37,211,102,0.2)",color:"#25D366",display:"flex",alignItems:"center",gap:4,fontSize:11,fontWeight:600,textDecoration:"none"}}>
                        {Icon.whatsapp} Send
                      </a>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

    // Mount the app
    const rootEl = document.getElementById('root');
    const reactRoot = ReactDOM.createRoot(rootEl);
    reactRoot.render(React.createElement(App));

    // Hide loading screen
    setTimeout(() => {
      const loader = document.getElementById('loading');
      if (loader) {
        loader.classList.add('hide');
        setTimeout(() => loader.remove(), 500);
      }
    }, 300);
  </script>
</body>
</html>
