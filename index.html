function doGet(e) {
  const action = e.parameter.action;
  if (action === "getAll") return getAll();
  return ContentService.createTextOutput(JSON.stringify({ error: "Unknown action" }))

  } catch(err) {
    return ContentService.createTextOutput(JSON.stringify({ error: err.message }))

  }

function getOrCreateSheet(name) {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  return ss.getSheetByName(name) || ss.insertSheet(name);
}

function writeTable(sheetName, rows, headers) {
  const sheet = getOrCreateSheet(sheetName);
  sheet.clearContents();
  if (!rows || rows.length === 0) {
    sheet.appendRow(headers);
    return;
  }
  sheet.appendRow(headers);
  rows.forEach(row => sheet.appendRow(headers.map(h => row[h] !== undefined ? row[h] : "")));
  // Auto-resize columns
  sheet.autoResizeColumns(1, headers.length);
}

  const [filterProp, setFilterProp] = React.useState("All");

  const [editingCustomer, setEditingCustomer] = React.useState(null);

  var filtered = db.customers.filter(function(c) {
    var matchQ = !search || c.name.toLowerCase().includes(search.toLowerCase()) || c.mobile.includes(search);
    var matchEq = filterEq === "All" || c.enquiryType === filterEq;
    var matchProp = filterProp === "All" || c.propertyType === filterProp;
    return matchQ && matchEq && matchProp;
  });

  if (sortBy === "recent") {
    filtered = filtered.slice().sort(function(a,b){ return (b.createdAt||"") > (a.createdAt||"") ? 1 : -1; });
  } else if (sortBy === "name") {
    filtered = filtered.slice().sort(function(a,b){ return (a.name||"").localeCompare(b.name||""); });
  } else if (sortBy === "hot") {
    var order = {"Hot":0,"Warm":1,"Cold":2};
    filtered = filtered.slice().sort(function(a,b){ return (order[a.enquiryType]||1) - (order[b.enquiryType]||1); });
  }

  var getLastFU = function(custId) {
    var fus = db.followups.filter(function(f){ return f.customerId === custId; }).sort(function(a,b){ return b.createdAt > a.createdAt ? 1 : -1; });
    return fus[0] || null;
  };
  var eqColor = function(eq) { return eq === "Hot" ? "#FC814A" : eq === "Warm" ? "#F6AD55" : "#63B3ED"; };

    setEditingCustomer(c);
    setSelectedCustomer(null);
